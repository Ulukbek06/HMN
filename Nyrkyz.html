<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurkyz Birthday Invitation</title>
    <style>
        :root{
          --cream:#fbf3e7;
          --warm:#ead5bd;
          --coffee:#4a2f25;
          --cocoa:#6d4a3d;
          --caramel:#b58963;
          --line:rgba(74,47,37,.18);
        }

        *{
          margin:0;
          padding:0;
          box-sizing:border-box;
          -webkit-tap-highlight-color:transparent;
        }

        body{
          min-height:100vh;
          overflow-x:hidden;
          font-family:Georgia,"Times New Roman",serif;
          color:var(--coffee);
          background:
          radial-gradient(circle at top left, rgba(181,137,99,.25), transparent 28%),
          radial-gradient(circle at bottom right, rgba(74,47,37,.18), transparent 30%),
          linear-gradient(145deg,#e9d4bd,#fbf3e7 48%,#e6c9ad);
        }

        .page{
          width:100%;
          min-height:100svh;
          padding:14px;
          display:flex;
          align-items:center;
          justify-content:center;
        }

        .card{
          position:relative;
          width:100%;
          max-width:430px;
          min-height:calc(100svh - 28px);
          overflow:hidden;
          border-radius:32px;
          padding:22px;
          background:
          linear-gradient(rgba(251,243,231,.97),rgba(251,243,231,.97)),
          repeating-linear-gradient(
          0deg,
          transparent 0,
          transparent 18px,
          rgba(74,47,37,.025) 18px,
          rgba(74,47,37,.025) 19px
          );
          border:1px solid rgba(74,47,37,.14);
          box-shadow:0 28px 80px rgba(74,47,37,.22);
        }

        .card::before{
          content:"";
          position:absolute;
          inset:12px;
          border:1px solid var(--line);
          border-radius:24px;
          pointer-events:none;
        }

        .flower{
          position:absolute;
          width:180px;
          opacity:.28;
          pointer-events:none;
        }

        .flower.one{
          left:-50px;
          top:-34px;
          transform:rotate(-18deg);
        }

        .flower.two{
          right:-52px;
          bottom:-46px;
          transform:rotate(162deg);
        }

        .content{
          position:relative;
          z-index:2;
          min-height:calc(100svh - 72px);
          display:flex;
          flex-direction:column;
          justify-content:center;
          text-align:center;
          padding:10px 8px;
        }

        .small{
          font-size:11px;
          letter-spacing:3px;
          text-transform:uppercase;
          color:var(--cocoa);
        }

        .title{
          margin-top:16px;
          font-size:clamp(48px,14vw,68px);
          line-height:.88;
          text-transform:uppercase;
          font-weight:500;
          letter-spacing:1px;
        }

        .script{
          display:block;
          margin-top:2px;
          font-family:"Brush Script MT","Segoe Script",cursive;
          font-size:clamp(62px,18vw,90px);
          line-height:.8;
          color:var(--cocoa);
          font-weight:400;
          text-transform:none;
        }

        .for{
          margin-top:18px;
          font-size:15px;
          color:var(--cocoa);
        }

        .name{
          margin-top:4px;
          font-size:clamp(36px,10vw,50px);
          line-height:1;
        }

        .divider{
          width:72%;
          height:1px;
          margin:24px auto 18px;
          background:linear-gradient(90deg,transparent,rgba(74,47,37,.34),transparent);
          position:relative;
        }

        .divider::after{
          content:"♡";
          position:absolute;
          left:50%;
          top:50%;
          transform:translate(-50%,-55%);
          background:var(--cream);
          color:var(--caramel);
          padding:0 12px;
          font-size:15px;
        }

        .date-box{
          width:min(100%,320px);
          margin:0 auto;
          padding:18px 16px;
          border-radius:26px;
          background:rgba(255,250,243,.62);
          border:1px solid rgba(74,47,37,.12);
        }

        .date-label{
          font-size:11px;
          letter-spacing:2.5px;
          text-transform:uppercase;
          color:var(--cocoa);
        }

        .date{
          margin-top:10px;
          font-size:clamp(38px,11vw,50px);
          line-height:1;
          text-transform:uppercase;
          letter-spacing:2px;
        }

        .date span{
          color:var(--caramel);
          font-style:italic;
        }

        .time{
          margin-top:10px;
          font-size:18px;
          letter-spacing:2px;
          text-transform:uppercase;
          color:var(--cocoa);
        }

        .countdown{
          width:min(100%,340px);
          margin:18px auto 0;
          display:grid;
          grid-template-columns:repeat(4,1fr);
          gap:7px;
        }

        .count{
          background:rgba(255,250,243,.58);
          border:1px solid rgba(74,47,37,.12);
          border-radius:18px;
          padding:12px 4px 9px;
          min-height:70px;
        }

        .num{
          display:block;
          font-size:27px;
          line-height:1;
        }

        .lab{
          display:block;
          margin-top:8px;
          font-size:9px;
          letter-spacing:1px;
          text-transform:uppercase;
          color:var(--cocoa);
        }

        .details{
          width:min(100%,340px);
          margin:18px auto 0;
          display:grid;
          gap:9px;
        }

        .detail{
          background:rgba(255,250,243,.58);
          border:1px solid rgba(74,47,37,.12);
          border-radius:22px;
          padding:14px 15px;
        }

        .detail-title{
          font-size:10px;
          letter-spacing:2px;
          text-transform:uppercase;
          color:var(--cocoa);
        }

        .detail-text{
          display:inline-block;
          margin-top:7px;
          font-size:19px;
          color:var(--coffee);
          text-decoration:none;
        }

        a.detail-text{
          border-bottom:1px solid rgba(74,47,37,.36);
        }

        .note{
          width:min(100%,320px);
          margin:18px auto 0;
          font-size:14px;
          line-height:1.55;
          color:var(--cocoa);
        }

        .music-overlay{
          position:fixed;
          inset:0;
          z-index:999;
          background:rgba(251,243,231,.92);
          backdrop-filter:blur(10px);
          display:flex;
          align-items:center;
          justify-content:center;
          padding:24px;
          transition:opacity .5s ease, visibility .5s ease;
        }

        .music-overlay.hidden{
          opacity:0;
          visibility:hidden;
          pointer-events:none;
        }

        .music-box{
          width:100%;
          max-width:320px;
          text-align:center;
        }

        .music-title{
          font-size:40px;
          line-height:1;
        }

        .music-text{
          margin-top:14px;
          font-size:16px;
          line-height:1.5;
          color:var(--cocoa);
        }

        .music-btn{
          margin-top:22px;
          width:100%;
          border:0;
          border-radius:999px;
          padding:16px 18px;
          background:var(--coffee);
          color:#fff8ef;
          font-family:Georgia,"Times New Roman",serif;
          font-size:15px;
          letter-spacing:1.4px;
          text-transform:uppercase;
          cursor:pointer;
          box-shadow:0 14px 28px rgba(74,47,37,.2);
        }

        @media (max-width:380px){
          .page{
            padding:10px;
          }

          .card{
            min-height:calc(100svh - 20px);
            padding:18px;
          }

          .content{
            min-height:calc(100svh - 56px);
            padding:8px 4px;
          }

          .countdown{
            gap:5px;
          }

          .num{
            font-size:24px;
          }
        }
    </style>
</head>

<body>

<div class="music-overlay" id="overlay">
    <div class="music-box">
        <div class="music-title">♡</div>

        <p class="music-text">
            Tap to enter<br>
            and play the music
        </p>

        <button class="music-btn" id="startBtn">
            Enter ✨
        </button>
    </div>
</div>

<main class="page">
    <section class="card">

        <svg class="flower one" viewBox="0 0 220 220">
            <g fill="none" stroke="#4a2f25" stroke-width="1.35">
                <path d="M106 102 C82 54 137 50 113 101 C162 72 178 121 117 111 C165 145 121 180 110 117 C78 168 41 129 102 111 C42 92 68 48 106 102 Z"/>
                <circle cx="112" cy="110" r="10"/>
            </g>
        </svg>

        <svg class="flower two" viewBox="0 0 220 220">
            <g fill="none" stroke="#4a2f25" stroke-width="1.35">
                <path d="M106 102 C82 54 137 50 113 101 C162 72 178 121 117 111 C165 145 121 180 110 117 C78 168 41 129 102 111 C42 92 68 48 106 102 Z"/>
                <circle cx="112" cy="110" r="10"/>
            </g>
        </svg>

        <div class="content">

            <p class="small">You are invited to</p>

            <h1 class="title">
                Birthday
                <span class="script">Party</span>
            </h1>

            <p class="for">in honor of</p>
            <p class="name">Nurkyz</p>

            <div class="divider"></div>

            <div class="date-box">
                <p class="date-label">Save the date</p>
                <p class="date">May <span>19</span></p>
                <p class="time">6:00 PM</p>
            </div>

            <div class="countdown">
                <div class="count">
                    <span class="num" id="days">00</span>
                    <span class="lab">days</span>
                </div>

                <div class="count">
                    <span class="num" id="hours">00</span>
                    <span class="lab">hours</span>
                </div>

                <div class="count">
                    <span class="num" id="minutes">00</span>
                    <span class="lab">min</span>
                </div>

                <div class="count">
                    <span class="num" id="seconds">00</span>
                    <span class="lab">sec</span>
                </div>
            </div>

            <div class="details">
                <div class="detail">
                    <p class="detail-title">Location</p>

                    <a class="detail-text"
                       href="https://2gis.kg/bishkek/geo/70000001019356620"
                       target="_blank"
                       rel="noopener">
                        DIYAR
                    </a>
                </div>

                <div class="detail">
                    <p class="detail-title">Dress code</p>
                    <p class="detail-text">Classic</p>
                </div>
            </div>

            <p class="note">
                Come beautifully dressed and ready for a warm evening together.
            </p>
        </div>
    </section>
</main>

<audio id="music" src="mus.mp3" loop playsinline></audio>

<script>
    const eventDate = new Date("2026-05-19T18:00:00").getTime();

    const days = document.getElementById("days");
    const hours = document.getElementById("hours");
    const minutes = document.getElementById("minutes");
    const seconds = document.getElementById("seconds");

    function two(n){
      return String(n).padStart(2,"0");
    }

    function updateCountdown(){
      const now = new Date().getTime();
      const distance = eventDate - now;

      if(distance <= 0){
        days.textContent = "00";
        hours.textContent = "00";
        minutes.textContent = "00";
        seconds.textContent = "00";
        return;
      }

      days.textContent = two(Math.floor(distance / (1000 * 60 * 60 * 24)));
      hours.textContent = two(Math.floor((distance / (1000 * 60 * 60)) % 24));
      minutes.textContent = two(Math.floor((distance / (1000 * 60)) % 60));
      seconds.textContent = two(Math.floor((distance / 1000) % 60));
    }

    updateCountdown();
    setInterval(updateCountdown,1000);

    const overlay = document.getElementById("overlay");
    const startBtn = document.getElementById("startBtn");
    const music = document.getElementById("music");

    startBtn.addEventListener("click", async () => {
      try{
        await music.play();
      } catch(error){}

      overlay.classList.add("hidden");
    });
</script>

</body>
</html>
